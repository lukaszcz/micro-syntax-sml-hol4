# sml-minimal-highlighter.yaml
# Regex dialect: Oniguruma / TextMate-ish
name: SML
scope: source.sml
fileTypes: [sml, sig, ml, cm]

patterns:
  # --- comments (non-nested unless your engine supports begin/end stacking) ---
  - name: comment.block.sml
    begin: '\(\*'
    end: '\*\)'
    patterns:
      - name: keyword.todo.sml
        match: '\b(TODO|FIXME|XXX)\b'

  # --- strings + escapes ---
  - name: string.quoted.double.sml
    begin: '"'
    end: '"'
    patterns:
      - name: constant.character.escape.sml
        match: '\\(u[0-9A-Fa-f]{4}|[abtnvfr"\\]|[0-9]{3}|[\s]+\\|\^[@A-Z\[\\\]\^_])'
      - name: invalid.illegal.escape.sml
        match: '\\.'

  # --- character literals (#"...") ---
  - name: constant.character.sml
    match: '#"(\\(u[0-9A-Fa-f]{4}|[abtnvfr"\\]|[0-9]{3}|\^[@A-Z\[\\\]\^_])|[^"\\])"'

  # --- keywords ---
  - name: keyword.control.sml
    match: '\b(if|then|else|case|of|fn|raise|handle|while|do)\b'
  - name: keyword.other.sml
    match: '\b(abstype|and|andalso|as|before|datatype|end|eqtype|exception|fun|in|infix|infixl|infixr|let|local|nonfix|open|op|orelse|rec|sharing|sig|signature|struct|structure|type|val|where|with|withtype)\b'

  # --- constants / builtin-ish names ---
  - name: constant.language.sml
    match: '\b(true|false|nil|NONE|SOME)\b'

  # --- operators / punctuation-ish tokens ---
  - name: keyword.operator.sml
    match: '(:=|=>|::|->|:>|=|\^|div\b|mod\b|not\b|or\b|quot\b|rem\b)'
  - name: punctuation.terminator.sml
    match: ';;'
  - name: variable.language.wildcard.sml
    match: '\b_\b'

  # --- numbers (incl. SML word literals) ---
  - name: constant.numeric.integer.hex.sml
    match: '\b~?0x[0-9A-Fa-f]+\b'
  - name: constant.numeric.integer.word.sml
    match: '\b0w[0-9]+\b'
  - name: constant.numeric.integer.word.hex.sml
    match: '\b0wx[0-9A-Fa-f]+\b'
  - name: constant.numeric.float.sml
    match: '\b~?[0-9]+\.[0-9]+\b'
  - name: constant.numeric.float.exp.sml
    match: '\b~?[0-9]+(\.[0-9]+)?[eE]~?[0-9]+\b'
  - name: constant.numeric.integer.dec.sml
    match: '\b~?[0-9]+\b'

  # --- identifiers / type vars / constructors / module paths ---
  - name: variable.other.typevar.sml
    match: '''[A-Za-z_][A-Za-z0-9_'']*'
  - name: entity.name.type.constructor.sml
    match: '\b[A-Z][A-Za-z0-9_'']*\b'
  - name: entity.name.namespace.module.sml
    match: '\b[A-Z][A-Za-z0-9_'']*\.'   # prefix, keep '.' unscoped if you prefer

  - name: variable.other.identifier.sml
    match: '\b([a-z_][A-Za-z0-9_'']*)\b'

  # --- special constructors / empties often highlighted specially ---
  - name: constant.language.unit.sml
    match: '\(\s*\)'
  - name: constant.language.list.empty.sml
    match: '\[\s*\]'
  - name: constant.language.vector.empty.sml
    match: '#\[\s*\]'
